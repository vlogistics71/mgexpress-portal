<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Invoices</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --dark-green: #064f3b;
      --green: #087455;
      --light-green: #e7f5ef;
      --coral: #ff665c;
      --background: #f3f8f6;
      --white: #ffffff;
      --ink: #17221e;
      --muted: #68756f;
      --line: #dfe8e4;
      --danger: #9b2929;
      --danger-bg: #fff0f0;
      --warning: #946000;
      --warning-bg: #fff5d8;
      --blue: #245d9c;
      --blue-bg: #eaf3ff;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .hidden {
      display: none !important;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 20px;
      background: var(--dark-green);
      color: white;
    }

    .topbar-inner {
      width: min(1050px, 100%);
      margin: auto;
    }

    .brand {
      font-size: 23px;
      font-weight: 900;
      line-height: 1.08;
    }

    .brand span {
      color: var(--coral);
    }

    .staff-email {
      margin-top: 7px;
      font-size: 13px;
      opacity: .82;
      overflow-wrap: anywhere;
    }

    .container {
      width: min(1050px, 100%);
      margin: auto;
      padding: 28px 18px 75px;
    }

    .heading-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 17px;
    }

    h1 {
      margin: 0;
      font-size: clamp(39px, 8vw, 55px);
      line-height: 1.03;
    }

    .dashboard-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      color: var(--dark-green);
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .stat-card {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: white;
      box-shadow: 0 7px 22px rgba(0, 0, 0, .04);
    }

    .stat-number {
      color: var(--green);
      font-size: 30px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .stat-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .filters {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 21px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .filter-grid {
      display: grid;
      grid-template-columns:
        minmax(0, 2fr)
        minmax(165px, 1fr)
        auto;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 51px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--ink);
    }

    .refresh-button {
      align-self: end;
      min-height: 51px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--dark-green);
      font-weight: 900;
      cursor: pointer;
    }

    .list-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 27px 2px 13px;
    }

    .list-heading h2 {
      margin: 0;
      font-size: 28px;
    }

    .visible-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .invoice-list {
      display: grid;
      gap: 13px;
    }

    .invoice-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .invoice-summary {
      display: grid;
      grid-template-columns:
        minmax(130px, .7fr)
        minmax(0, 1.25fr)
        minmax(125px, .65fr)
        minmax(125px, .65fr)
        auto;
      gap: 15px;
      align-items: center;
      width: 100%;
      min-height: 92px;
      padding: 17px 18px;
      border: 0;
      background: white;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .invoice-summary:active {
      background: #f7faf9;
    }

    .invoice-number {
      color: var(--dark-green);
      font-size: 18px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .job-number {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .customer-name {
      font-size: 16px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .customer-email {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .meta-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .amount-value {
      color: var(--green);
      font-size: 18px;
      font-weight: 900;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-paid {
      background: var(--light-green);
      color: var(--green);
    }

    .status-unpaid {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .status-overdue {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .expand-arrow {
      color: var(--green);
      font-size: 25px;
      font-weight: 900;
      transition: transform .2s ease;
    }

    .invoice-card.open .expand-arrow {
      transform: rotate(90deg);
    }

    .invoice-details {
      display: none;
      padding: 18px;
      border-top: 1px solid var(--line);
      background: #fbfdfc;
    }

    .invoice-card.open .invoice-details {
      display: block;
    }

    .details-grid {
      display: grid;
      grid-template-columns:
        repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail {
      min-width: 0;
      padding: 15px;
      border-radius: 15px;
      background: white;
      border: 1px solid var(--line);
    }

    .detail.full {
      grid-column: 1 / -1;
    }

    .detail-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .invoice-controls {
      display: grid;
      grid-template-columns:
        minmax(150px, 1fr)
        minmax(150px, 1fr)
        repeat(3, auto);
      gap: 10px;
      align-items: end;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--line);
    }

    .control-field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .control-field input,
    .control-field select {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: white;
      color: var(--ink);
    }

    .save-button,
    .print-button,
    .job-button {
      min-height: 46px;
      padding: 10px 13px;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .save-button {
      border: 0;
      background: var(--green);
      color: white;
    }

    .print-button,
    .job-button {
      border: 1px solid var(--line);
      background: white;
      color: var(--dark-green);
    }

    .invoice-message {
      display: none;
      margin-top: 12px;
      padding: 11px 13px;
      border-radius: 11px;
      font-size: 13px;
      line-height: 1.4;
    }

    .invoice-message.success {
      display: block;
      background: var(--light-green);
      color: var(--dark-green);
    }

    .invoice-message.error {
      display: block;
      background: var(--danger-bg);
      color: var(--danger);
    }

    .empty,
    .error {
      padding: 31px 22px;
      border-radius: 19px;
      text-align: center;
      line-height: 1.55;
    }

    .empty {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
    }

    .error {
      background: var(--danger-bg);
      color: var(--danger);
    }

    @media (max-width: 850px) {
      .invoice-summary {
        grid-template-columns:
          minmax(0, 1fr)
          auto;
        gap: 8px 12px;
        min-height: 135px;
      }

      .invoice-main,
      .customer-block,
      .amount-block {
        grid-column: 1 / 2;
      }

      .status-pill {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
      }

      .expand-arrow {
        grid-column: 2 / 3;
        grid-row: 2 / 4;
        align-self: center;
      }

      .invoice-controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .heading-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .dashboard-button {
        width: 100%;
      }

      .stats {
        grid-template-columns:
          repeat(2, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .refresh-button {
        width: 100%;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .detail.full {
        grid-column: auto;
      }

      .invoice-controls {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 430px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body {
        background: white;
      }

      .topbar,
      .heading-row,
      .stats,
      .filters,
      .list-heading,
      .dispatch-menu-button,
      .dispatch-side-menu,
      .dispatch-menu-overlay,
      .invoice-summary,
      .invoice-controls,
      .invoice-message {
        display: none !important;
      }

      .container {
        width: 100%;
        padding: 0;
      }

      .invoice-card {
        display: none;
        border: 0;
        box-shadow: none;
      }

      .invoice-card.printing {
        display: block;
      }

      .invoice-card.printing
      .invoice-details {
        display: block;
        padding: 0;
        border: 0;
        background: white;
      }

      .invoice-card.printing::before {
        content: "MG EXPRESS";
        display: block;
        margin-bottom: 10px;
        color: #064f3b;
        font-size: 30px;
        font-weight: 900;
      }

      .invoice-card.printing::after {
        content:
          "Thank you for choosing MG Express.";
        display: block;
        margin-top: 25px;
        color: #68756f;
        font-size: 13px;
      }

      .detail {
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        MG <span>EXPRESS</span> DISPATCH
      </div>

      <div
        class="staff-email"
        id="staffEmail"
      ></div>
    </div>
  </header>

  <main class="container">
    <div class="heading-row">
      <div>
        <div class="eyebrow">
          Customer billing and payment tracking
        </div>

        <h1>Invoices</h1>
      </div>

      <a
        class="dashboard-button"
        href="https://portal.migenteexpress.com/dashboard.html"
      >
        ← Dashboard
      </a>
    </div>

    <section class="stats">
      <div class="stat-card">
        <div
          class="stat-number"
          id="outstandingTotal"
        >
          $0.00
        </div>

        <div class="stat-label">
          Outstanding
        </div>
      </div>

      <div class="stat-card">
        <div
          class="stat-number"
          id="paidTotal"
        >
          $0.00
        </div>

        <div class="stat-label">
          Paid
        </div>
      </div>

      <div class="stat-card">
        <div
          class="stat-number"
          id="overdueTotal"
        >
          $0.00
        </div>

        <div class="stat-label">
          Overdue
        </div>
      </div>

      <div class="stat-card">
        <div
          class="stat-number"
          id="invoiceCount"
        >
          0
        </div>

        <div class="stat-label">
          Total Invoices
        </div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-grid">
        <div class="field">
          <label for="searchInput">
            Search
          </label>

          <input
            id="searchInput"
            type="search"
            placeholder="Invoice, job number, customer or email"
          >
        </div>

        <div class="field">
          <label for="statusFilter">
            Invoice Status
          </label>

          <select id="statusFilter">
            <option value="">
              All Invoices
            </option>

            <option value="unpaid">
              Unpaid
            </option>

            <option value="paid">
              Paid
            </option>

            <option value="overdue">
              Overdue
            </option>
          </select>
        </div>

        <button
          class="refresh-button"
          id="refreshButton"
          type="button"
        >
          Refresh
        </button>
      </div>
    </section>

    <div class="list-heading">
      <h2>Customer Invoices</h2>

      <div
        class="visible-count"
        id="visibleCount"
      >
        0 invoices
      </div>
    </div>

    <section
      class="invoice-list"
      id="invoicesBox"
    >
      <div class="empty">
        Loading invoices...
      </div>
    </section>
  </main>

  <script>
    const client = supabase.createClient(
      "https://dczlucwfjayymlwbzzdi.supabase.co",
      "sb_publishable_kcv_a78ZyUxMo2neKUANdw_XN7eAMpI"
    );

    window.mgDispatchClient = client;

    const STORAGE_KEY =
      "mg-express-invoice-records-v1";

    const invoicesBox =
      document.getElementById("invoicesBox");

    const searchInput =
      document.getElementById("searchInput");

    const statusFilter =
      document.getElementById("statusFilter");

    let deliveredJobs = [];
    let invoiceRecords = {};
    let invoices = [];

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function cleanStatus(value) {
      return String(value || "")
        .trim()
        .toLowerCase();
    }

    function money(value) {
      return Number(value || 0).toLocaleString(
        "en-US",
        {
          style: "currency",
          currency: "USD"
        }
      );
    }

    function formatDate(value) {
      if (!value) {
        return "Not recorded";
      }

      const date =
        value instanceof Date
          ? value
          : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return "Not recorded";
      }

      return new Intl.DateTimeFormat(
        "en-US",
        {
          month: "short",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }
      ).format(date);
    }

    function completedDate(job) {
      const value =
        job.completed_at ||
        job.delivery_photo_uploaded_at ||
        job.created_at;

      if (!value) {
        return null;
      }

      const date = new Date(value);

      return Number.isNaN(date.getTime())
        ? null
        : date;
    }

    function loadSavedRecords() {
      try {
        invoiceRecords =
          JSON.parse(
            localStorage.getItem(
              STORAGE_KEY
            ) || "{}"
          );
      } catch {
        invoiceRecords = {};
      }
    }

    function saveRecords() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(invoiceRecords)
      );
    }

    function invoiceNumber(job) {
      const jobNumber =
        String(
          job.job_number || job.id || ""
        )
          .replace(/[^a-z0-9]/gi, "")
          .toUpperCase();

      return (
        "INV-" +
        (
          jobNumber ||
          String(job.id || "")
            .slice(0, 8)
            .toUpperCase()
        )
      );
    }

    function originalCharge(job) {
      const possibleValues = [
        job.customer_charge,
        job.customer_price,
        job.quoted_price,
        job.quote_amount,
        job.price,
        job.total_price,
        job.total_amount,
        job.amount,
        job.charge
      ];

      const value =
        possibleValues.find(item =>
          item !== null &&
          item !== undefined &&
          item !== "" &&
          !Number.isNaN(Number(item))
        );

      return Number(value || 0);
    }

    function dueDate(job) {
      const completed =
        completedDate(job) ||
        new Date(job.created_at);

      const due = new Date(completed);
      due.setDate(due.getDate() + 30);

      return due;
    }

    function buildInvoices() {
      const now = new Date();

      invoices =
        deliveredJobs.map(job => {
          const id =
            String(job.id || "");

          const saved =
            invoiceRecords[id] || {};

          const amount =
            saved.amount !== undefined
              ? Number(saved.amount)
              : originalCharge(job);

          let paymentStatus =
            saved.paymentStatus ||
            "unpaid";

          const due = dueDate(job);

          if (
            paymentStatus !== "paid" &&
            due < now
          ) {
            paymentStatus = "overdue";
          }

          return {
            id,
            invoiceNumber:
              invoiceNumber(job),

            job,
            amount,
            paymentStatus,

            paidAt:
              saved.paidAt || null,

            dueDate: due
          };
        });

      invoices.sort((first, second) => {
        const firstDate =
          completedDate(
            first.job
          )?.getTime() || 0;

        const secondDate =
          completedDate(
            second.job
          )?.getTime() || 0;

        return secondDate - firstDate;
      });

      updateStatistics();
    }

    function updateStatistics() {
      const outstanding =
        invoices
          .filter(invoice =>
            invoice.paymentStatus !==
            "paid"
          )
          .reduce(
            (total, invoice) =>
              total +
              Number(invoice.amount || 0),
            0
          );

      const paid =
        invoices
          .filter(invoice =>
            invoice.paymentStatus ===
            "paid"
          )
          .reduce(
            (total, invoice) =>
              total +
              Number(invoice.amount || 0),
            0
          );

      const overdue =
        invoices
          .filter(invoice =>
            invoice.paymentStatus ===
            "overdue"
          )
          .reduce(
            (total, invoice) =>
              total +
              Number(invoice.amount || 0),
            0
          );

      document
        .getElementById(
          "outstandingTotal"
        )
        .textContent = money(outstanding);

      document
        .getElementById("paidTotal")
        .textContent = money(paid);

      document
        .getElementById("overdueTotal")
        .textContent = money(overdue);

      document
        .getElementById("invoiceCount")
        .textContent = invoices.length;
    }

    function filteredInvoices() {
      const search =
        searchInput.value
          .trim()
          .toLowerCase();

      const selectedStatus =
        statusFilter.value;

      return invoices.filter(invoice => {
        if (
          selectedStatus &&
          invoice.paymentStatus !==
          selectedStatus
        ) {
          return false;
        }

        if (!search) {
          return true;
        }

        const job = invoice.job;

        const searchable = [
          invoice.invoiceNumber,
          job.job_number,
          job.customer_name,
          job.customer_email,
          job.pickup_address,
          job.delivery_address
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return searchable.includes(search);
      });
    }

    function paymentLabel(value) {
      const labels = {
        paid: "Paid",
        unpaid: "Unpaid",
        overdue: "Overdue"
      };

      return labels[value] || "Unpaid";
    }

    function renderInvoices() {
      const shownInvoices =
        filteredInvoices();

      document
        .getElementById("visibleCount")
        .textContent =
          shownInvoices.length +
          (
            shownInvoices.length === 1
              ? " invoice"
              : " invoices"
          );

      if (!shownInvoices.length) {
        invoicesBox.innerHTML = `
          <div class="empty">
            No delivered customer jobs match
            the selected invoice filters.
          </div>
        `;

        return;
      }

      invoicesBox.innerHTML =
        shownInvoices.map(invoice => {
          const job = invoice.job;

          const jobUrl =
            "https://portal.migenteexpress.com/" +
            "job.html?id=" +
            encodeURIComponent(invoice.id);

          return `
            <article
              class="invoice-card"
              id="invoice-card-${escapeHtml(
                invoice.id
              )}"
            >
              <button
                class="invoice-summary"
                type="button"
                data-toggle-invoice="${escapeHtml(
                  invoice.id
                )}"
              >
                <div class="invoice-main">
                  <div class="invoice-number">
                    ${escapeHtml(
                      invoice.invoiceNumber
                    )}
                  </div>

                  <div class="job-number">
                    ${escapeHtml(
                      job.job_number ||
                      "Completed Job"
                    )}
                  </div>
                </div>

                <div class="customer-block">
                  <div class="customer-name">
                    ${escapeHtml(
                      job.customer_name ||
                      "Customer"
                    )}
                  </div>

                  <div class="customer-email">
                    ${escapeHtml(
                      job.customer_email ||
                      "No email recorded"
                    )}
                  </div>
                </div>

                <div class="amount-block">
                  <span class="meta-label">
                    Amount
                  </span>

                  <div class="amount-value">
                    ${escapeHtml(
                      money(invoice.amount)
                    )}
                  </div>
                </div>

                <div
                  class="status-pill status-${escapeHtml(
                    invoice.paymentStatus
                  )}"
                >
                  ${escapeHtml(
                    paymentLabel(
                      invoice.paymentStatus
                    )
                  )}
                </div>

                <div class="expand-arrow">
                  ›
                </div>
              </button>

              <div class="invoice-details">
                <div class="details-grid">
                  <div class="detail">
                    <span class="detail-label">
                      Invoice Number
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        invoice.invoiceNumber
                      )}
                    </div>
                  </div>

                  <div class="detail">
                    <span class="detail-label">
                      Customer
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        job.customer_name ||
                        "Customer"
                      )}
                    </div>
                  </div>

                  <div class="detail full">
                    <span class="detail-label">
                      Pickup
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        job.pickup_address ||
                        "Not provided"
                      )}
                    </div>
                  </div>

                  <div class="detail full">
                    <span class="detail-label">
                      Delivery
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        job.delivery_address ||
                        "Not provided"
                      )}
                    </div>
                  </div>

                  <div class="detail">
                    <span class="detail-label">
                      Vehicle
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        job.vehicle_type ||
                        "Not provided"
                      )}
                    </div>
                  </div>

                  <div class="detail">
                    <span class="detail-label">
                      Completed
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        formatDate(
                          completedDate(job)
                        )
                      )}
                    </div>
                  </div>

                  <div class="detail">
                    <span class="detail-label">
                      Due Date
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        formatDate(
                          invoice.dueDate
                        )
                      )}
                    </div>
                  </div>

                  <div class="detail">
                    <span class="detail-label">
                      Payment Status
                    </span>

                    <div class="detail-value">
                      ${escapeHtml(
                        paymentLabel(
                          invoice.paymentStatus
                        )
                      )}
                    </div>
                  </div>
                </div>

                <div class="invoice-controls">
                  <div class="control-field">
                    <label
                      for="amount-${escapeHtml(
                        invoice.id
                      )}"
                    >
                      Customer Charge
                    </label>

                    <input
                      id="amount-${escapeHtml(
                        invoice.id
                      )}"
                      type="number"
                      min="0"
                      step="0.01"
                      value="${escapeHtml(
                        Number(
                          invoice.amount || 0
                        ).toFixed(2)
                      )}"
                    >
                  </div>

                  <div class="control-field">
                    <label
                      for="status-${escapeHtml(
                        invoice.id
                      )}"
                    >
                      Payment Status
                    </label>

                    <select
                      id="status-${escapeHtml(
                        invoice.id
                      )}"
                    >
                      <option
                        value="unpaid"
                        ${
                          invoice.paymentStatus ===
                          "unpaid"
                            ? "selected"
                            : ""
                        }
                      >
                        Unpaid
                      </option>

                      <option
                        value="paid"
                        ${
                          invoice.paymentStatus ===
                          "paid"
                            ? "selected"
                            : ""
                        }
                      >
                        Paid
                      </option>

                      <option
                        value="overdue"
                        ${
                          invoice.paymentStatus ===
                          "overdue"
                            ? "selected"
                            : ""
                        }
                      >
                        Overdue
                      </option>
                    </select>
                  </div>

                  <button
                    class="save-button"
                    type="button"
                    data-save-invoice="${escapeHtml(
                      invoice.id
                    )}"
                  >
                    Save
                  </button>

                  <button
                    class="print-button"
                    type="button"
                    data-print-invoice="${escapeHtml(
                      invoice.id
                    )}"
                  >
                    Print
                  </button>

                  <a
                    class="job-button"
                    href="${escapeHtml(jobUrl)}"
                  >
                    Open Job
                  </a>
                </div>

                <div
                  class="invoice-message"
                  id="message-${escapeHtml(
                    invoice.id
                  )}"
                ></div>
              </div>
            </article>
          `;
        }).join("");

      document
        .querySelectorAll(
          "[data-toggle-invoice]"
        )
        .forEach(button => {
          button.addEventListener(
            "click",
            function () {
              document
                .getElementById(
                  "invoice-card-" +
                  this.dataset.toggleInvoice
                )
                .classList
                .toggle("open");
            }
          );
        });

      document
        .querySelectorAll(
          "[data-save-invoice]"
        )
        .forEach(button => {
          button.addEventListener(
            "click",
            function () {
              saveInvoice(
                this.dataset.saveInvoice,
                this
              );
            }
          );
        });

      document
        .querySelectorAll(
          "[data-print-invoice]"
        )
        .forEach(button => {
          button.addEventListener(
            "click",
            function () {
              printInvoice(
                this.dataset.printInvoice
              );
            }
          );
        });
    }

    function saveInvoice(
      invoiceId,
      button
    ) {
      const amountInput =
        document.getElementById(
          "amount-" + invoiceId
        );

      const statusInput =
        document.getElementById(
          "status-" + invoiceId
        );

      const message =
        document.getElementById(
          "message-" + invoiceId
        );

      const amount =
        Number(amountInput.value || 0);

      if (
        Number.isNaN(amount) ||
        amount < 0
      ) {
        message.className =
          "invoice-message error";

        message.textContent =
          "Enter a valid customer charge.";

        return;
      }

      button.disabled = true;
      button.textContent = "Saving...";

      try {
        const paymentStatus =
          statusInput.value;

        invoiceRecords[invoiceId] = {
          amount,
          paymentStatus,

          paidAt:
            paymentStatus === "paid"
              ? (
                  invoiceRecords[
                    invoiceId
                  ]?.paidAt ||
                  new Date().toISOString()
                )
              : null
        };

        saveRecords();
        buildInvoices();
        renderInvoices();

        const updatedMessage =
          document.getElementById(
            "message-" + invoiceId
          );

        if (updatedMessage) {
          updatedMessage.className =
            "invoice-message success";

          updatedMessage.textContent =
            "Invoice updated successfully.";
        }
      } catch (error) {
        message.className =
          "invoice-message error";

        message.textContent =
          error.message ||
          "Unable to update invoice.";
      } finally {
        button.disabled = false;
        button.textContent = "Save";
      }
    }

    function printInvoice(invoiceId) {
      const card =
        document.getElementById(
          "invoice-card-" + invoiceId
        );

      if (!card) {
        return;
      }

      card.classList.add("printing");
      card.classList.add("open");

      window.print();

      setTimeout(() => {
        card.classList.remove(
          "printing"
        );
      }, 500);
    }

    async function verifyDispatchUser() {
      const sessionResult =
        await client.auth.getSession();

      const session =
        sessionResult.data.session;

      if (!session) {
        location.replace("/index.html");
        return null;
      }

      document
        .getElementById("staffEmail")
        .textContent =
          session.user.email || "";

      const profileResult = await client
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .maybeSingle();

      if (
        profileResult.error ||
        !profileResult.data
      ) {
        throw new Error(
          profileResult.error?.message ||
          "No MG Express profile was found."
        );
      }

      const role =
        String(
          profileResult.data.role || ""
        ).toLowerCase();

      if (
        ![
          "admin",
          "staff",
          "dispatcher"
        ].includes(role)
      ) {
        throw new Error(
          "This account does not have dispatch access."
        );
      }

      window.dispatchEvent(
        new CustomEvent(
          "mg-dispatch-ready",
          {
            detail: {
              email:
                session.user.email
            }
          }
        )
      );

      return session;
    }

    async function loadInvoices() {
      invoicesBox.innerHTML = `
        <div class="empty">
          Loading invoices...
        </div>
      `;

      const result = await client
        .from("quotes")
        .select("*")
        .eq("status", "delivered")
        .order("created_at", {
          ascending: false
        });

      if (result.error) {
        throw result.error;
      }

      deliveredJobs =
        result.data || [];

      loadSavedRecords();
      buildInvoices();
      renderInvoices();
    }

    searchInput.addEventListener(
      "input",
      renderInvoices
    );

    statusFilter.addEventListener(
      "change",
      renderInvoices
    );

    document
      .getElementById("refreshButton")
      .addEventListener(
        "click",
        async function () {
          this.disabled = true;
          this.textContent =
            "Refreshing...";

          try {
            await loadInvoices();
          } catch (error) {
            invoicesBox.innerHTML = `
              <div class="error">
                ${escapeHtml(
                  error.message ||
                  "Unable to refresh invoices."
                )}
              </div>
            `;
          } finally {
            this.disabled = false;
            this.textContent = "Refresh";
          }
        }
      );

    (async function startPage() {
      try {
        const session =
          await verifyDispatchUser();

        if (!session) {
          return;
        }

        await loadInvoices();
      } catch (error) {
        invoicesBox.innerHTML = `
          <div class="error">
            ${escapeHtml(
              error.message ||
              "Unable to load invoices."
            )}
          </div>
        `;
      }
    })();
  </script>

  <script src="/dispatch-menu-v3.js"></script>
</body>
