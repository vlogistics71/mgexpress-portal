<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Active Jobs</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --dark-green: #064f3b;
      --green: #087455;
      --light-green: #e7f5ef;
      --coral: #ff665c;
      --background: #f3f8f6;
      --white: #ffffff;
      --ink: #17221e;
      --muted: #68756f;
      --line: #dfe8e4;
      --danger: #9b2929;
      --danger-bg: #fff0f0;
      --warning: #946000;
      --warning-bg: #fff5d8;
      --blue: #245d9c;
      --blue-bg: #eaf3ff;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 20px;
      background: var(--dark-green);
      color: white;
    }

    .topbar-inner {
      width: min(950px, 100%);
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .brand {
      font-size: 23px;
      font-weight: 900;
      line-height: 1.08;
    }

    .brand span {
      color: var(--coral);
    }

    .staff-email {
      margin-top: 7px;
      font-size: 13px;
      opacity: .82;
      overflow-wrap: anywhere;
    }

    .container {
      width: min(950px, 100%);
      margin: auto;
      padding: 28px 18px 70px;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 17px;
    }

    h1 {
      margin: 0;
      font-size: clamp(39px, 8vw, 55px);
      line-height: 1.03;
    }

    .heading-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 25px;
    }

    .create-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 19px;
      border-radius: 15px;
      background: var(--green);
      color: white;
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .stat-card {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: white;
      box-shadow: 0 7px 22px rgba(0, 0, 0, .04);
    }

    .stat-number {
      color: var(--green);
      font-size: 31px;
      font-weight: 900;
    }

    .stat-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .filters {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 21px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(180px, 1fr) auto;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 51px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--ink);
    }

    .refresh-button {
      align-self: end;
      min-height: 51px;
      padding: 12px 19px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--dark-green);
      font-weight: 900;
      cursor: pointer;
    }

    .list-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 27px 2px 14px;
    }

    .list-heading h2 {
      margin: 0;
      font-size: 29px;
    }

    .visible-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .jobs-list {
      display: grid;
      gap: 13px;
    }

    .job-card {
      display: block;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 7px 23px rgba(0, 0, 0, .045);
    }

    .job-card:active {
      transform: scale(.992);
    }

    .job-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .job-number {
      color: var(--dark-green);
      font-size: 22px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .customer {
      margin-top: 5px;
      font-size: 17px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .customer-email {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .status-pill {
      flex-shrink: 0;
      padding: 8px 11px;
      border-radius: 999px;
      background: var(--light-green);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-new {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .status-waiting_payment {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .route {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 15px;
      border-radius: 15px;
      background: #f6faf8;
    }

    .route-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .route-address {
      font-size: 14px;
      font-weight: 750;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .route-arrow {
      color: var(--green);
      font-size: 23px;
      font-weight: 900;
    }

    .job-bottom {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
      margin-top: 15px;
    }

    .meta-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .open-job {
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .empty,
    .error {
      padding: 31px 22px;
      border-radius: 19px;
      text-align: center;
      line-height: 1.55;
    }

    .empty {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
    }

    .error {
      background: var(--danger-bg);
      color: var(--danger);
    }

    @media (max-width: 720px) {
      .heading-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .create-button {
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .refresh-button {
        width: 100%;
      }

      .route {
        grid-template-columns: 1fr;
      }

      .route-arrow {
        transform: rotate(90deg);
        justify-self: start;
      }

      .job-bottom {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .open-job {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">
          MG <span>EXPRESS</span> DISPATCH
        </div>

        <div
          class="staff-email"
          id="staffEmail"
        ></div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="heading-row">
      <div>
        <div class="eyebrow">
          Dispatch work queue
        </div>

        <h1>Active Jobs</h1>
      </div>

      <a
        class="create-button"
        href="/dashboard.html"
      >
        + Create New Job
      </a>
    </div>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalOpen">
          0
        </div>

        <div class="stat-label">
          Total Open
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalUnassigned">
          0
        </div>

        <div class="stat-label">
          Unassigned
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalTransit">
          0
        </div>

        <div class="stat-label">
          In Transit
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalWaiting">
          0
        </div>

        <div class="stat-label">
          Waiting Payment
        </div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-grid">
        <div class="field">
          <label for="searchInput">
            Search
          </label>

          <input
            id="searchInput"
            type="search"
            placeholder="Job number, customer, driver or address"
          >
        </div>

        <div class="field">
          <label for="statusFilter">
            Status
          </label>

          <select id="statusFilter">
            <option value="">
              All Open Jobs
            </option>

            <option value="new">New</option>

            <option value="waiting_payment">
              Waiting Payment
            </option>

            <option value="paid">Paid</option>

            <option value="ready">Ready</option>

            <option value="in_transit">
              In Transit
            </option>
          </select>
        </div>

        <button
          class="refresh-button"
          id="refreshButton"
          type="button"
        >
          Refresh
        </button>
      </div>
    </section>

    <div class="list-heading">
      <h2>Open Work Orders</h2>

      <div class="visible-count" id="visibleCount">
        0 jobs
      </div>
    </div>

    <section class="jobs-list" id="jobsList">
      <div class="empty">
        Loading active jobs...
      </div>
    </section>
  </main>

  <script>
    const client = supabase.createClient(
      "https://dczlucwfjayymlwbzzdi.supabase.co",
      "sb_publishable_kcv_a78ZyUxMo2neKUANdw_XN7eAMpI"
    );

    window.mgDispatchClient = client;

    const jobsList =
      document.getElementById("jobsList");

    const searchInput =
      document.getElementById("searchInput");

    const statusFilter =
      document.getElementById("statusFilter");

    let jobs = [];
    let driversById = {};

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function cleanStatus(value) {
      return String(value || "new")
        .trim()
        .toLowerCase();
    }

    function statusLabel(value) {
      const labels = {
        new: "New",
        waiting_payment: "Waiting Payment",
        paid: "Paid",
        ready: "Ready",
        in_transit: "In Transit"
      };

      return labels[cleanStatus(value)] ||
        String(value || "Open")
          .replaceAll("_", " ");
    }

    function money(value) {
      return Number(value || 0).toLocaleString(
        "en-US",
        {
          style: "currency",
          currency: "USD"
        }
      );
    }

    function formatDate(value) {
      if (!value) {
        return "Not set";
      }

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat(
        "en-US",
        {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }
      ).format(date);
    }

    function shortAddress(value) {
      const address =
        String(value || "Not provided");

      if (address.length <= 60) {
        return address;
      }

      return address.slice(0, 57) + "...";
    }

    async function verifyDispatchUser() {
      const sessionResult =
        await client.auth.getSession();

      const session =
        sessionResult.data.session;

      if (!session) {
        location.replace("/index.html");
        return null;
      }

      document
        .getElementById("staffEmail")
        .textContent =
          session.user.email || "";

      const profileResult = await client
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .maybeSingle();

      if (
        profileResult.error ||
        !profileResult.data
      ) {
        throw new Error(
          profileResult.error?.message ||
          "No MG Express profile was found."
        );
      }

      const role = String(
        profileResult.data.role || ""
      ).toLowerCase();

      if (
        ![
          "admin",
          "staff",
          "dispatcher"
        ].includes(role)
      ) {
        if (role === "driver") {
          location.replace("/driver.html");
          return null;
        }

        if (role === "customer") {
          location.replace("/customer.html");
          return null;
        }

        throw new Error(
          "This account does not have dispatch access."
        );
      }

      window.dispatchEvent(
        new CustomEvent("mg-dispatch-ready", {
          detail: {
            email: session.user.email
          }
        })
      );

      return session;
    }

    async function loadDrivers() {
      const result = await client
        .from("drivers")
        .select("id,full_name,email");

      if (result.error) {
        driversById = {};
        return;
      }

      driversById = {};

      (result.data || []).forEach(driver => {
        driversById[String(driver.id)] =
          driver.full_name ||
          driver.email ||
          "Driver";
      });
    }

    async function loadJobs() {
      jobsList.innerHTML = `
        <div class="empty">
          Loading active jobs...
        </div>
      `;

      const result = await client
        .from("quotes")
        .select("*")
        .order("created_at", {
          ascending: false
        });

      if (result.error) {
        throw result.error;
      }

      jobs = (result.data || []).filter(job => {
        const status =
          cleanStatus(job.status);

        return ![
          "delivered",
          "cancelled",
          "canceled"
        ].includes(status);
      });

      updateStatistics();
      renderJobs();
    }

    function updateStatistics() {
      document
        .getElementById("totalOpen")
        .textContent = jobs.length;

      document
        .getElementById("totalUnassigned")
        .textContent =
          jobs.filter(job =>
            !job.assigned_driver_id
          ).length;

      document
        .getElementById("totalTransit")
        .textContent =
          jobs.filter(job =>
            cleanStatus(job.status) ===
            "in_transit"
          ).length;

      document
        .getElementById("totalWaiting")
        .textContent =
          jobs.filter(job =>
            cleanStatus(job.status) ===
            "waiting_payment"
          ).length;
    }

    function getVisibleJobs() {
      const search =
        searchInput.value
          .trim()
          .toLowerCase();

      const selectedStatus =
        statusFilter.value;

      return jobs.filter(job => {
        const status =
          cleanStatus(job.status);

        if (
          selectedStatus &&
          status !== selectedStatus
        ) {
          return false;
        }

        if (!search) {
          return true;
        }

        const driverName =
          driversById[
            String(job.assigned_driver_id || "")
          ] || "";

        const searchable = [
          job.job_number,
          job.customer_name,
          job.customer_email,
          job.pickup_address,
          job.delivery_address,
          driverName,
          job.special_instructions
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return searchable.includes(search);
      });
    }

    function renderJobs() {
      const visibleJobs =
        getVisibleJobs();

      document
        .getElementById("visibleCount")
        .textContent =
          visibleJobs.length +
          (visibleJobs.length === 1
            ? " job"
            : " jobs");

      if (!visibleJobs.length) {
        jobsList.innerHTML = `
          <div class="empty">
            No active jobs match your search or filter.
          </div>
        `;

        return;
      }

      jobsList.innerHTML =
        visibleJobs.map(job => {
          const status =
            cleanStatus(job.status);

          const realJobId =
            String(job.id || "").trim();

          const driverName =
            job.assigned_driver_id
              ? (
                  driversById[
                    String(job.assigned_driver_id)
                  ] || "Assigned Driver"
                )
              : "Unassigned";

          const estimatedDelivery =
            job.estimated_delivery ||
            job.estimated_delivery_at ||
            job.delivery_eta ||
            job.estimated_delivery_time ||
            null;

          /*
            This creates the correct link using
            the actual Supabase UUID.
          */
          const jobUrl =
            "/job.html?id=" +
            encodeURIComponent(realJobId);

          return `
            <a
              class="job-card"
              href="${escapeHtml(jobUrl)}"
            >
              <div class="job-top">
                <div>
                  <div class="job-number">
                    ${escapeHtml(
                      job.job_number || "Job"
                    )}
                  </div>

                  <div class="customer">
                    ${escapeHtml(
                      job.customer_name ||
                      "Customer"
                    )}
                  </div>

                  ${
                    job.customer_email
                      ? `
                        <div class="customer-email">
                          ${escapeHtml(
                            job.customer_email
                          )}
                        </div>
                      `
                      : ""
                  }
                </div>

                <div
                  class="status-pill status-${escapeHtml(
                    status
                  )}"
                >
                  ${escapeHtml(
                    statusLabel(status)
                  )}
                </div>
              </div>

              <div class="route">
                <div>
                  <span class="route-label">
                    Pickup
                  </span>

                  <div class="route-address">
                    ${escapeHtml(
                      shortAddress(
                        job.pickup_address
                      )
                    )}
                  </div>
                </div>

                <div class="route-arrow">
                  →
                </div>

                <div>
                  <span class="route-label">
                    Delivery
                  </span>

                  <div class="route-address">
                    ${escapeHtml(
                      shortAddress(
                        job.delivery_address
                      )
                    )}
                  </div>
                </div>
              </div>

              <div class="job-bottom">
                <div>
                  <span class="meta-label">
                    Driver
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(driverName)}
                  </div>
                </div>

                <div>
                  <span class="meta-label">
                    Driver Pay
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(
                      money(job.driver_pay)
                    )}
                  </div>
                </div>

                <div>
                  <span class="meta-label">
                    Estimated Delivery
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(
                      formatDate(
                        estimatedDelivery
                      )
                    )}
                  </div>
                </div>

                <div class="open-job">
                  Open Job →
                </div>
              </div>
            </a>
          `;
        }).join("");
    }

    searchInput.addEventListener(
      "input",
      renderJobs
    );

    statusFilter.addEventListener(
      "change",
      renderJobs
    );

    document
      .getElementById("refreshButton")
      .addEventListener(
        "click",
        async function () {
          this.disabled = true;
          this.textContent =
            "Refreshing...";

          try {
            await loadDrivers();
            await loadJobs();
          } catch (error) {
            jobsList.innerHTML = `
              <div class="error">
                ${escapeHtml(
                  error.message ||
                  "Unable to refresh active jobs."
                )}
              </div>
            `;
          } finally {
            this.disabled = false;
            this.textContent = "Refresh";
          }
        }
      );

    (async function startPage() {
      try {
        const session =
          await verifyDispatchUser();

        if (!session) {
          return;
        }

        await loadDrivers();
        await loadJobs();
      } catch (error) {
        jobsList.innerHTML = `
          <div class="error">
            ${escapeHtml(
              error.message ||
              "Unable to load active jobs."
            )}
          </div>
        `;
      }
    })();
  </script>

  <script src="/dispatch-menu.js"></script>
</body>
</html>
