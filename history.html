<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Job History</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --dark-green: #064f3b;
      --green: #087455;
      --light-green: #e7f5ef;
      --coral: #ff665c;
      --background: #f3f8f6;
      --white: #ffffff;
      --ink: #17221e;
      --muted: #68756f;
      --line: #dfe8e4;
      --danger: #9b2929;
      --danger-bg: #fff0f0;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 20px;
      background: var(--dark-green);
      color: white;
    }

    .topbar-inner {
      width: min(950px, 100%);
      margin: auto;
    }

    .brand {
      font-size: 23px;
      font-weight: 900;
      line-height: 1.08;
    }

    .brand span {
      color: var(--coral);
    }

    .staff-email {
      margin-top: 7px;
      font-size: 13px;
      opacity: .82;
      overflow-wrap: anywhere;
    }

    .container {
      width: min(950px, 100%);
      margin: auto;
      padding: 28px 18px 70px;
    }

    .heading-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 17px;
    }

    h1 {
      margin: 0;
      font-size: clamp(39px, 8vw, 55px);
      line-height: 1.03;
    }

    .active-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      color: var(--dark-green);
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 21px;
    }

    .stat-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: white;
      box-shadow: 0 7px 22px rgba(0, 0, 0, .04);
    }

    .stat-number {
      color: var(--green);
      font-size: 31px;
      font-weight: 900;
    }

    .stat-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .filters {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 21px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .filter-grid {
      display: grid;
      grid-template-columns:
        minmax(0, 2fr)
        minmax(165px, 1fr)
        minmax(150px, 1fr)
        minmax(150px, 1fr)
        auto;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 50px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--ink);
    }

    .refresh-button {
      align-self: end;
      min-height: 50px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--dark-green);
      font-weight: 900;
      cursor: pointer;
    }

    .list-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 27px 2px 13px;
    }

    .list-heading h2 {
      margin: 0;
      font-size: 28px;
    }

    .visible-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .history-list {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .history-row {
      display: grid;
      grid-template-columns:
        minmax(130px, .8fr)
        minmax(0, 1.25fr)
        minmax(135px, .75fr)
        minmax(170px, .9fr)
        auto;
      gap: 16px;
      align-items: center;
      min-height: 86px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    .history-row:active {
      background: #f7faf9;
    }

    .job-number {
      color: var(--dark-green);
      font-size: 18px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .customer-name {
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .customer-email {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-delivered {
      background: var(--light-green);
      color: var(--green);
    }

    .status-cancelled,
    .status-canceled {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .closed-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .closed-date {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .arrow {
      color: var(--green);
      font-size: 26px;
      font-weight: 900;
    }

    .empty,
    .error {
      padding: 31px 22px;
      border-radius: 19px;
      text-align: center;
      line-height: 1.55;
    }

    .empty {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
    }

    .error {
      background: var(--danger-bg);
      color: var(--danger);
    }

    @media (max-width: 850px) {
      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .search-field {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .heading-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .active-button {
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .search-field {
        grid-column: auto;
      }

      .refresh-button {
        width: 100%;
      }

      .history-row {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 12px;
        min-height: 105px;
      }

      .job-number {
        font-size: 19px;
      }

      .customer-block {
        grid-column: 1 / 2;
      }

      .status-pill {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
      }

      .closed-block {
        grid-column: 1 / 2;
      }

      .arrow {
        grid-column: 2 / 3;
        grid-row: 2 / 4;
        align-self: center;
      }
    }

    @media (max-width: 430px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        MG <span>EXPRESS</span> DISPATCH
      </div>

      <div
        class="staff-email"
        id="staffEmail"
      ></div>
    </div>
  </header>

  <main class="container">
    <div class="heading-row">
      <div>
        <div class="eyebrow">
          Completed and cancelled work orders
        </div>

        <h1>Job History</h1>
      </div>

      <a
        class="active-button"
        href="/jobs.html"
      >
        ← Active Jobs
      </a>
    </div>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalClosed">
          0
        </div>

        <div class="stat-label">
          Total Closed
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalDelivered">
          0
        </div>

        <div class="stat-label">
          Delivered
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalCancelled">
          0
        </div>

        <div class="stat-label">
          Cancelled
        </div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-grid">
        <div class="field search-field">
          <label for="searchInput">
            Search
          </label>

          <input
            id="searchInput"
            type="search"
            placeholder="Job number, customer or address"
          >
        </div>

        <div class="field">
          <label for="statusFilter">
            Status
          </label>

          <select id="statusFilter">
            <option value="">
              All Closed Jobs
            </option>

            <option value="delivered">
              Delivered
            </option>

            <option value="cancelled">
              Cancelled
            </option>
          </select>
        </div>

        <div class="field">
          <label for="dateFrom">
            From
          </label>

          <input id="dateFrom" type="date">
        </div>

        <div class="field">
          <label for="dateTo">
            To
          </label>

          <input id="dateTo" type="date">
        </div>

        <button
          class="refresh-button"
          id="refreshButton"
          type="button"
        >
          Refresh
        </button>
      </div>
    </section>

    <div class="list-heading">
      <h2>Closed Jobs</h2>

      <div class="visible-count" id="visibleCount">
        0 jobs
      </div>
    </div>

    <section id="historyList">
      <div class="empty">
        Loading job history...
      </div>
    </section>
  </main>

  <script>
    const client = supabase.createClient(
      "https://dczlucwfjayymlwbzzdi.supabase.co",
      "sb_publishable_kcv_a78ZyUxMo2neKUANdw_XN7eAMpI"
    );

    window.mgDispatchClient = client;

    const historyList =
      document.getElementById("historyList");

    const searchInput =
      document.getElementById("searchInput");

    const statusFilter =
      document.getElementById("statusFilter");

    const dateFrom =
      document.getElementById("dateFrom");

    const dateTo =
      document.getElementById("dateTo");

    let jobs = [];

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function cleanStatus(value) {
      return String(value || "")
        .trim()
        .toLowerCase();
    }

    function statusLabel(value) {
      const status = cleanStatus(value);

      if (status === "delivered") {
        return "Delivered";
      }

      if (
        status === "cancelled" ||
        status === "canceled"
      ) {
        return "Cancelled";
      }

      return "Closed";
    }

    function closedDate(job) {
      const value =
        job.completed_at ||
        job.delivery_photo_uploaded_at ||
        job.created_at;

      if (!value) {
        return null;
      }

      const date = new Date(value);

      return Number.isNaN(date.getTime())
        ? null
        : date;
    }

    function formatDate(value) {
      if (!value) {
        return "Not recorded";
      }

      return new Intl.DateTimeFormat(
        "en-US",
        {
          month: "short",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }
      ).format(value);
    }

    async function verifyDispatchUser() {
      const sessionResult =
        await client.auth.getSession();

      const session =
        sessionResult.data.session;

      if (!session) {
        location.replace("/index.html");
        return null;
      }

      document
        .getElementById("staffEmail")
        .textContent =
          session.user.email || "";

      const profileResult = await client
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .maybeSingle();

      if (
        profileResult.error ||
        !profileResult.data
      ) {
        throw new Error(
          profileResult.error?.message ||
          "No MG Express profile was found."
        );
      }

      const role = String(
        profileResult.data.role || ""
      ).toLowerCase();

      if (
        ![
          "admin",
          "staff",
          "dispatcher"
        ].includes(role)
      ) {
        if (role === "driver") {
          location.replace("/driver.html");
          return null;
        }

        if (role === "customer") {
          location.replace("/customer.html");
          return null;
        }

        throw new Error(
          "This account does not have dispatch access."
        );
      }

      window.dispatchEvent(
        new CustomEvent("mg-dispatch-ready", {
          detail: {
            email: session.user.email
          }
        })
      );

      return session;
    }

    async function loadHistory() {
      historyList.innerHTML = `
        <div class="empty">
          Loading job history...
        </div>
      `;

      const result = await client
        .from("quotes")
        .select("*")
        .order("created_at", {
          ascending: false
        });

      if (result.error) {
        throw result.error;
      }

      jobs = (result.data || []).filter(job =>
        [
          "delivered",
          "cancelled",
          "canceled"
        ].includes(cleanStatus(job.status))
      );

      jobs.sort((a, b) => {
        const first =
          closedDate(a)?.getTime() || 0;

        const second =
          closedDate(b)?.getTime() || 0;

        return second - first;
      });

      renderJobs();
    }

    function filteredJobs() {
      const search =
        searchInput.value
          .trim()
          .toLowerCase();

      const selectedStatus =
        statusFilter.value;

      const startDate =
        dateFrom.value
          ? new Date(
              dateFrom.value + "T00:00:00"
            )
          : null;

      const endDate =
        dateTo.value
          ? new Date(
              dateTo.value + "T23:59:59.999"
            )
          : null;

      return jobs.filter(job => {
        const originalStatus =
          cleanStatus(job.status);

        const normalizedStatus =
          originalStatus === "canceled"
            ? "cancelled"
            : originalStatus;

        if (
          selectedStatus &&
          normalizedStatus !== selectedStatus
        ) {
          return false;
        }

        const date = closedDate(job);

        if (
          startDate &&
          (!date || date < startDate)
        ) {
          return false;
        }

        if (
          endDate &&
          (!date || date > endDate)
        ) {
          return false;
        }

        if (!search) {
          return true;
        }

        const searchable = [
          job.job_number,
          job.customer_name,
          job.customer_email,
          job.pickup_address,
          job.delivery_address
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return searchable.includes(search);
      });
    }

    function updateStats(shownJobs) {
      const delivered =
        shownJobs.filter(job =>
          cleanStatus(job.status) ===
          "delivered"
        ).length;

      const cancelled =
        shownJobs.filter(job =>
          [
            "cancelled",
            "canceled"
          ].includes(cleanStatus(job.status))
        ).length;

      document
        .getElementById("totalClosed")
        .textContent = shownJobs.length;

      document
        .getElementById("totalDelivered")
        .textContent = delivered;

      document
        .getElementById("totalCancelled")
        .textContent = cancelled;
    }

    function renderJobs() {
      const shownJobs = filteredJobs();

      updateStats(shownJobs);

      document
        .getElementById("visibleCount")
        .textContent =
          shownJobs.length +
          (
            shownJobs.length === 1
              ? " job"
              : " jobs"
          );

      if (!shownJobs.length) {
        historyList.className = "";

        historyList.innerHTML = `
          <div class="empty">
            No closed jobs match your filters.
          </div>
        `;

        return;
      }

      historyList.className = "history-list";

      historyList.innerHTML =
        shownJobs.map(job => {
          const status =
            cleanStatus(job.status);

          const jobId =
            String(job.id || "").trim();

          const jobUrl =
            "/job.html?id=" +
            encodeURIComponent(jobId);

          return `
            <a
              class="history-row"
              href="${escapeHtml(jobUrl)}"
            >
              <div class="job-number">
                ${escapeHtml(
                  job.job_number || "Job"
                )}
              </div>

              <div class="customer-block">
                <div class="customer-name">
                  ${escapeHtml(
                    job.customer_name ||
                    "Customer"
                  )}
                </div>

                ${
                  job.customer_email
                    ? `
                      <div class="customer-email">
                        ${escapeHtml(
                          job.customer_email
                        )}
                      </div>
                    `
                    : ""
                }
              </div>

              <div
                class="status-pill status-${escapeHtml(
                  status
                )}"
              >
                ${escapeHtml(
                  statusLabel(status)
                )}
              </div>

              <div class="closed-block">
                <span class="closed-label">
                  Closed
                </span>

                <div class="closed-date">
                  ${escapeHtml(
                    formatDate(closedDate(job))
                  )}
                </div>
              </div>

              <div class="arrow">›</div>
            </a>
          `;
        }).join("");
    }

    searchInput.addEventListener(
      "input",
      renderJobs
    );

    statusFilter.addEventListener(
      "change",
      renderJobs
    );

    dateFrom.addEventListener(
      "change",
      renderJobs
    );

    dateTo.addEventListener(
      "change",
      renderJobs
    );

    document
      .getElementById("refreshButton")
      .addEventListener(
        "click",
        async function () {
          this.disabled = true;
          this.textContent =
            "Refreshing...";

          try {
            await loadHistory();
          } catch (error) {
            historyList.className = "";

            historyList.innerHTML = `
              <div class="error">
                ${escapeHtml(
                  error.message ||
                  "Unable to refresh job history."
                )}
              </div>
            `;
          } finally {
            this.disabled = false;
            this.textContent = "Refresh";
          }
        }
      );

    (async function startPage() {
      try {
        const session =
          await verifyDispatchUser();

        if (!session) {
          return;
        }

        await loadHistory();
      } catch (error) {
        historyList.className = "";

        historyList.innerHTML = `
          <div class="error">
            ${escapeHtml(
              error.message ||
              "Unable to load job history."
            )}
          </div>
        `;
      }
    })();
  </script>

  <script src="/dispatch-menu.js"></script>
</body>
</html>
