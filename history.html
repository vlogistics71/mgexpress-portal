<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Job History</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --dark-green: #064f3b;
      --green: #087455;
      --light-green: #e7f5ef;
      --coral: #ff665c;
      --background: #f3f8f6;
      --white: #ffffff;
      --ink: #17221e;
      --muted: #68756f;
      --line: #dfe8e4;
      --danger: #9b2929;
      --danger-bg: #fff0f0;
      --warning: #986200;
      --warning-bg: #fff5d8;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 20px;
      background: var(--dark-green);
      color: white;
    }

    .topbar-inner {
      width: min(950px, 100%);
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .brand {
      font-size: 23px;
      font-weight: 900;
      line-height: 1.08;
    }

    .brand span {
      color: var(--coral);
    }

    .staff-email {
      margin-top: 7px;
      font-size: 13px;
      opacity: .82;
      overflow-wrap: anywhere;
    }

    .container {
      width: min(950px, 100%);
      margin: auto;
      padding: 28px 18px 70px;
    }

    .heading-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 25px;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 17px;
    }

    h1 {
      margin: 0;
      font-size: clamp(39px, 8vw, 55px);
      line-height: 1.03;
    }

    .active-jobs-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 19px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: white;
      color: var(--dark-green);
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .stat-card {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: white;
      box-shadow: 0 7px 22px rgba(0, 0, 0, .04);
    }

    .stat-number {
      color: var(--green);
      font-size: 30px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .stat-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .filters {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 21px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .filter-grid {
      display: grid;
      grid-template-columns:
        minmax(0, 2fr)
        minmax(155px, 1fr)
        minmax(145px, 1fr)
        minmax(145px, 1fr)
        auto;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 51px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--ink);
    }

    .refresh-button {
      align-self: end;
      min-height: 51px;
      padding: 12px 19px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--dark-green);
      font-weight: 900;
      cursor: pointer;
    }

    .list-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 27px 2px 14px;
    }

    .list-heading h2 {
      margin: 0;
      font-size: 29px;
    }

    .visible-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .jobs-list {
      display: grid;
      gap: 13px;
    }

    .job-card {
      display: block;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 7px 23px rgba(0, 0, 0, .045);
    }

    .job-card:active {
      transform: scale(.992);
    }

    .job-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .job-number {
      color: var(--dark-green);
      font-size: 22px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .customer {
      margin-top: 5px;
      font-size: 17px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .customer-email {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .status-pill {
      flex-shrink: 0;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-delivered {
      background: var(--light-green);
      color: var(--green);
    }

    .status-cancelled,
    .status-canceled {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .route {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 15px;
      border-radius: 15px;
      background: #f6faf8;
    }

    .route-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .route-address {
      font-size: 14px;
      font-weight: 750;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .route-arrow {
      color: var(--green);
      font-size: 23px;
      font-weight: 900;
    }

    .job-bottom {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
      margin-top: 15px;
    }

    .meta-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .open-job {
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .empty,
    .error {
      padding: 31px 22px;
      border-radius: 19px;
      text-align: center;
      line-height: 1.55;
    }

    .empty {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
    }

    .error {
      background: var(--danger-bg);
      color: var(--danger);
    }

    @media (max-width: 850px) {
      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .search-field {
        grid-column: 1 / -1;
      }

      .refresh-button {
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      .heading-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .active-jobs-button {
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .search-field {
        grid-column: auto;
      }

      .route {
        grid-template-columns: 1fr;
      }

      .route-arrow {
        transform: rotate(90deg);
        justify-self: start;
      }

      .job-bottom {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .open-job {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">
          MG <span>EXPRESS</span> DISPATCH
        </div>

        <div
          class="staff-email"
          id="staffEmail"
        ></div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="heading-row">
      <div>
        <div class="eyebrow">
          Completed and cancelled work orders
        </div>

        <h1>Job History</h1>
      </div>

      <a
        class="active-jobs-button"
        href="/jobs.html"
      >
        ← Active Jobs
      </a>
    </div>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalClosed">
          0
        </div>

        <div class="stat-label">
          Total Closed
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalDelivered">
          0
        </div>

        <div class="stat-label">
          Delivered
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalCancelled">
          0
        </div>

        <div class="stat-label">
          Cancelled
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalDriverPay">
          $0.00
        </div>

        <div class="stat-label">
          Driver Pay Shown
        </div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-grid">
        <div class="field search-field">
          <label for="searchInput">
            Search
          </label>

          <input
            id="searchInput"
            type="search"
            placeholder="Job number, customer, driver or address"
          >
        </div>

        <div class="field">
          <label for="statusFilter">
            Status
          </label>

          <select id="statusFilter">
            <option value="">
              All Closed Jobs
            </option>

            <option value="delivered">
              Delivered
            </option>

            <option value="cancelled">
              Cancelled
            </option>
          </select>
        </div>

        <div class="field">
          <label for="dateFrom">
            From Date
          </label>

          <input
            id="dateFrom"
            type="date"
          >
        </div>

        <div class="field">
          <label for="dateTo">
            To Date
          </label>

          <input
            id="dateTo"
            type="date"
          >
        </div>

        <button
          class="refresh-button"
          id="refreshButton"
          type="button"
        >
          Refresh
        </button>
      </div>
    </section>

    <div class="list-heading">
      <h2>Closed Work Orders</h2>

      <div class="visible-count" id="visibleCount">
        0 jobs
      </div>
    </div>

    <section class="jobs-list" id="jobsList">
      <div class="empty">
        Loading job history...
      </div>
    </section>
  </main>

  <script>
    const client = supabase.createClient(
      "https://dczlucwfjayymlwbzzdi.supabase.co",
      "sb_publishable_kcv_a78ZyUxMo2neKUANdw_XN7eAMpI"
    );

    window.mgDispatchClient = client;

    const jobsList =
      document.getElementById("jobsList");

    const searchInput =
      document.getElementById("searchInput");

    const statusFilter =
      document.getElementById("statusFilter");

    const dateFrom =
      document.getElementById("dateFrom");

    const dateTo =
      document.getElementById("dateTo");

    let closedJobs = [];
    let driversById = {};

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function cleanStatus(value) {
      return String(value || "")
        .trim()
        .toLowerCase();
    }

    function statusLabel(value) {
      const status = cleanStatus(value);

      if (status === "delivered") {
        return "Delivered";
      }

      if (
        status === "cancelled" ||
        status === "canceled"
      ) {
        return "Cancelled";
      }

      return String(value || "Closed")
        .replaceAll("_", " ");
    }

    function money(value) {
      return Number(value || 0).toLocaleString(
        "en-US",
        {
          style: "currency",
          currency: "USD"
        }
      );
    }

    function formatDate(value) {
      if (!value) {
        return "Not recorded";
      }

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat(
        "en-US",
        {
          month: "short",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }
      ).format(date);
    }

    function shortAddress(value) {
      const address =
        String(value || "Not provided");

      if (address.length <= 60) {
        return address;
      }

      return address.slice(0, 57) + "...";
    }

    function jobClosedDate(job) {
      const value =
        job.completed_at ||
        job.delivery_photo_uploaded_at ||
        job.created_at;

      if (!value) {
        return null;
      }

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return null;
      }

      return date;
    }

    async function verifyDispatchUser() {
      const sessionResult =
        await client.auth.getSession();

      const session =
        sessionResult.data.session;

      if (!session) {
        location.replace("/index.html");
        return null;
      }

      document
        .getElementById("staffEmail")
        .textContent =
          session.user.email || "";

      const profileResult = await client
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .maybeSingle();

      if (
        profileResult.error ||
        !profileResult.data
      ) {
        throw new Error(
          profileResult.error?.message ||
          "No MG Express profile was found."
        );
      }

      const role = String(
        profileResult.data.role || ""
      ).toLowerCase();

      if (
        ![
          "admin",
          "staff",
          "dispatcher"
        ].includes(role)
      ) {
        if (role === "driver") {
          location.replace("/driver.html");
          return null;
        }

        if (role === "customer") {
          location.replace("/customer.html");
          return null;
        }

        throw new Error(
          "This account does not have dispatch access."
        );
      }

      window.dispatchEvent(
        new CustomEvent("mg-dispatch-ready", {
          detail: {
            email: session.user.email
          }
        })
      );

      return session;
    }

    async function loadDrivers() {
      const result = await client
        .from("drivers")
        .select("id,full_name,email");

      if (result.error) {
        driversById = {};
        return;
      }

      driversById = {};

      (result.data || []).forEach(driver => {
        driversById[String(driver.id)] =
          driver.full_name ||
          driver.email ||
          "Driver";
      });
    }

    async function loadHistory() {
      jobsList.innerHTML = `
        <div class="empty">
          Loading job history...
        </div>
      `;

      const result = await client
        .from("quotes")
        .select("*")
        .order("created_at", {
          ascending: false
        });

      if (result.error) {
        throw result.error;
      }

      closedJobs =
        (result.data || []).filter(job => {
          return [
            "delivered",
            "cancelled",
            "canceled"
          ].includes(cleanStatus(job.status));
        });

      closedJobs.sort((a, b) => {
        const dateA =
          jobClosedDate(a)?.getTime() || 0;

        const dateB =
          jobClosedDate(b)?.getTime() || 0;

        return dateB - dateA;
      });

      updateStatistics();
      renderJobs();
    }

    function visibleJobs() {
      const search =
        searchInput.value
          .trim()
          .toLowerCase();

      const selectedStatus =
        statusFilter.value;

      const fromValue =
        dateFrom.value
          ? new Date(
              dateFrom.value + "T00:00:00"
            )
          : null;

      const toValue =
        dateTo.value
          ? new Date(
              dateTo.value + "T23:59:59.999"
            )
          : null;

      return closedJobs.filter(job => {
        const status =
          cleanStatus(job.status);

        const normalizedStatus =
          status === "canceled"
            ? "cancelled"
            : status;

        if (
          selectedStatus &&
          normalizedStatus !== selectedStatus
        ) {
          return false;
        }

        const closedDate =
          jobClosedDate(job);

        if (
          fromValue &&
          (
            !closedDate ||
            closedDate < fromValue
          )
        ) {
          return false;
        }

        if (
          toValue &&
          (
            !closedDate ||
            closedDate > toValue
          )
        ) {
          return false;
        }

        if (!search) {
          return true;
        }

        const driverName =
          driversById[
            String(job.assigned_driver_id || "")
          ] || "";

        const searchable = [
          job.job_number,
          job.customer_name,
          job.customer_email,
          job.pickup_address,
          job.delivery_address,
          driverName,
          job.special_instructions
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return searchable.includes(search);
      });
    }

    function updateStatistics() {
      const shownJobs =
        visibleJobs();

      const delivered =
        shownJobs.filter(job =>
          cleanStatus(job.status) ===
          "delivered"
        ).length;

      const cancelled =
        shownJobs.filter(job =>
          [
            "cancelled",
            "canceled"
          ].includes(cleanStatus(job.status))
        ).length;

      const driverPay =
        shownJobs.reduce(
          (total, job) =>
            total + Number(job.driver_pay || 0),
          0
        );

      document
        .getElementById("totalClosed")
        .textContent = shownJobs.length;

      document
        .getElementById("totalDelivered")
        .textContent = delivered;

      document
        .getElementById("totalCancelled")
        .textContent = cancelled;

      document
        .getElementById("totalDriverPay")
        .textContent = money(driverPay);
    }

    function renderJobs() {
      const jobs =
        visibleJobs();

      updateStatistics();

      document
        .getElementById("visibleCount")
        .textContent =
          jobs.length +
          (
            jobs.length === 1
              ? " job"
              : " jobs"
          );

      if (!jobs.length) {
        jobsList.innerHTML = `
          <div class="empty">
            No closed jobs match the selected filters.
          </div>
        `;

        return;
      }

      jobsList.innerHTML =
        jobs.map(job => {
          const status =
            cleanStatus(job.status);

          const realJobId =
            String(job.id || "").trim();

          const driverName =
            job.assigned_driver_id
              ? (
                  driversById[
                    String(job.assigned_driver_id)
                  ] || "Assigned Driver"
                )
              : "Unassigned";

          const closedDate =
            jobClosedDate(job);

          const jobUrl =
            "/job.html?id=" +
            encodeURIComponent(realJobId);

          return `
            <a
              class="job-card"
              href="${escapeHtml(jobUrl)}"
            >
              <div class="job-top">
                <div>
                  <div class="job-number">
                    ${escapeHtml(
                      job.job_number || "Job"
                    )}
                  </div>

                  <div class="customer">
                    ${escapeHtml(
                      job.customer_name ||
                      "Customer"
                    )}
                  </div>

                  ${
                    job.customer_email
                      ? `
                        <div class="customer-email">
                          ${escapeHtml(
                            job.customer_email
                          )}
                        </div>
                      `
                      : ""
                  }
                </div>

                <div
                  class="status-pill status-${escapeHtml(
                    status
                  )}"
                >
                  ${escapeHtml(
                    statusLabel(status)
                  )}
                </div>
              </div>

              <div class="route">
                <div>
                  <span class="route-label">
                    Pickup
                  </span>

                  <div class="route-address">
                    ${escapeHtml(
                      shortAddress(
                        job.pickup_address
                      )
                    )}
                  </div>
                </div>

                <div class="route-arrow">
                  →
                </div>

                <div>
                  <span class="route-label">
                    Delivery
                  </span>

                  <div class="route-address">
                    ${escapeHtml(
                      shortAddress(
                        job.delivery_address
                      )
                    )}
                  </div>
                </div>
              </div>

              <div class="job-bottom">
                <div>
                  <span class="meta-label">
                    Driver
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(driverName)}
                  </div>
                </div>

                <div>
                  <span class="meta-label">
                    Driver Pay
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(
                      money(job.driver_pay)
                    )}
                  </div>
                </div>

                <div>
                  <span class="meta-label">
                    Closed
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(
                      formatDate(closedDate)
                    )}
                  </div>
                </div>

                <div class="open-job">
                  View Job →
                </div>
              </div>
            </a>
          `;
        }).join("");
    }

    searchInput.addEventListener(
      "input",
      renderJobs
    );

    statusFilter.addEventListener(
      "change",
      renderJobs
    );

    dateFrom.addEventListener(
      "change",
      renderJobs
    );

    dateTo.addEventListener(
      "change",
      renderJobs
    );

    document
      .getElementById("refreshButton")
      .addEventListener(
        "click",
        async function () {
          this.disabled = true;
          this.textContent =
            "Refreshing...";

          try {
            await loadDrivers();
            await loadHistory();
          } catch (error) {
            jobsList.innerHTML = `
              <div class="error">
                ${escapeHtml(
                  error.message ||
                  "Unable to refresh job history."
                )}
              </div>
            `;
          } finally {
            this.disabled = false;
            this.textContent = "Refresh";
          }
        }
      );

    (async function startPage() {
      try {
        const session =
          await verifyDispatchUser();

        if (!session) {
          return;
        }

        await loadDrivers();
        await loadHistory();
      } catch (error) {
        jobsList.innerHTML = `
          <div class="error">
            ${escapeHtml(
              error.message ||
              "Unable to load job history."
            )}
          </div>
        `;
      }
    })();
  </script>

  <script src="/dispatch-menu.js"></script>
</body>
</html>
