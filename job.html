<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Job Details | Mi Gente Express</title><link rel="stylesheet" href="/assets/styles.css"></head>
<body><header class="topbar no-print"><div class="container topbar-inner"><div class="brand">MI GENTE <span>EXPRESS</span></div><div class="nav"><button onclick="history.back()" class="secondary">Back</button><button onclick="print()">Print BOL</button></div></div></header><main><div class="container"><section id="job" class="panel"><h1>Loading…</h1></section></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script type="module">
import {db,sessionAndProfile,escapeHtml,money,statusLabel} from "/assets/js/core.js";await sessionAndProfile(["admin","dispatcher","customer","driver"]);const id=new URLSearchParams(location.search).get("id");
const {data:q,error}=await db.from("quotes").select("*").eq("id",id).single();if(error){job.innerHTML=`<div class="notice error">${escapeHtml(error.message)}</div>`}else{job.innerHTML=`<div class="toolbar"><div><p class="muted">Bill of Lading / Delivery Order</p><h1>${escapeHtml(q.job_number)}</h1></div><div><b>${statusLabel(q.status)}</b><br>${escapeHtml(q.payment_status||"unpaid").toUpperCase()}</div></div>
<div class="detail-grid"><div class="detail"><strong>Customer</strong><span>${escapeHtml(q.customer_name)}<br>${escapeHtml(q.customer_email)}<br>${escapeHtml(q.customer_phone||"")}</span></div><div class="detail"><strong>Service</strong><span>${escapeHtml(q.vehicle_type||"")}<br>${escapeHtml(q.delivery_speed||"")}<br>${money(q.approved_price)}</span></div><div class="detail"><strong>Pickup</strong><span>${escapeHtml(q.pickup_address)}</span></div><div class="detail"><strong>Delivery</strong><span>${escapeHtml(q.delivery_address)}</span></div></div><h2>Package</h2><p>${escapeHtml(q.package_type||"")} — ${escapeHtml(q.weight||"")}</p><h2>Instructions</h2><p>${escapeHtml(q.special_instructions||"None")}</p><div class="grid"><div class="signature">Pickup signature / date / time</div><div class="signature">Delivery signature / date / time</div></div>`}
</script></body></html>
