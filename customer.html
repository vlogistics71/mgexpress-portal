<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Customer CRM</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link
    rel="stylesheet"
    href="/assets/css/dispatch.css"
  >

  <link
    rel="stylesheet"
    href="/assets/css/customers.css"
  >
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-copy">
        <div class="brand">
          MG <span>EXPRESS</span> DISPATCH
        </div>

        <div
          class="staff-email"
          id="staffEmail"
        ></div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="heading-row">
      <div>
        <div class="eyebrow">
          Customer accounts, deliveries and billing
        </div>

        <h1>Customer CRM</h1>
      </div>

      <button
        class="primary-button"
        id="newCustomerButton"
        type="button"
      >
        + New Customer
      </button>
    </div>

    <section class="stats">
      <article class="stat-card">
        <div
          class="stat-number"
          id="totalCustomers"
        >
          0
        </div>

        <div class="stat-label">
          Total Customers
        </div>
      </article>

      <article class="stat-card">
        <div
          class="stat-number"
          id="recurringCustomers"
        >
          0
        </div>

        <div class="stat-label">
          Recurring Customers
        </div>
      </article>

      <article class="stat-card">
        <div
          class="stat-number"
          id="portalCustomers"
        >
          0
        </div>

        <div class="stat-label">
          Portal Access Enabled
        </div>
      </article>

      <article class="stat-card">
        <div
          class="stat-number"
          id="outstandingBalance"
        >
          $0.00
        </div>

        <div class="stat-label">
          Outstanding Invoices
        </div>
      </article>
    </section>

    <section class="customer-toolbar panel">
      <div class="field">
        <label for="customerSearch">
          Search Customers
        </label>

        <input
          id="customerSearch"
          type="search"
          placeholder="Name, company, email or phone"
        >
      </div>

      <div class="field">
        <label for="customerFilter">
          Customer Type
        </label>

        <select id="customerFilter">
          <option value="all">
            All Customers
          </option>

          <option value="recurring">
            Recurring Customers
          </option>

          <option value="portal">
            Portal Enabled
          </option>

          <option value="standard">
            Standard Customers
          </option>
        </select>
      </div>

      <button
        class="secondary-button"
        id="refreshCustomersButton"
        type="button"
      >
        Refresh
      </button>
    </section>

    <div
      class="message hidden"
      id="customerPageMessage"
    ></div>

    <section
      class="customer-list"
      id="customerList"
    >
      <div class="empty">
        Loading customers...
      </div>
    </section>
  </main>

  <div
    class="customer-modal-overlay"
    id="customerModalOverlay"
  >
    <section class="customer-modal">
      <div class="customer-modal-heading">
        <div>
          <div class="eyebrow">
            Customer account
          </div>

          <h2 id="customerModalTitle">
            New Customer
          </h2>
        </div>

        <button
          class="customer-modal-close"
          id="closeCustomerModalButton"
          type="button"
          aria-label="Close customer form"
        >
          ×
        </button>
      </div>

      <form id="customerForm">
        <input
          id="customerAccountId"
          type="hidden"
        >

        <div class="customer-form-grid">
          <div class="field">
            <label for="customerName">
              Contact Name
            </label>

            <input
              id="customerName"
              required
            >
          </div>

          <div class="field">
            <label for="companyName">
              Company Name
            </label>

            <input id="companyName">
          </div>

          <div class="field">
            <label for="customerEmail">
              Email
            </label>

            <input
              id="customerEmail"
              type="email"
              required
            >
          </div>

          <div class="field">
            <label for="customerPhone">
              Phone
            </label>

            <input
              id="customerPhone"
              type="tel"
            >
          </div>

          <div class="customer-checkbox-row">
            <label>
              <input
                id="isRecurringCustomer"
                type="checkbox"
              >

              Recurring Customer
            </label>

            <label>
              <input
                id="portalAccessEnabled"
                type="checkbox"
              >

              Portal Access Enabled
            </label>
          </div>
        </div>

        <div class="customer-modal-actions">
          <button
            class="primary-button"
            id="saveCustomerButton"
            type="submit"
          >
            Save Customer
          </button>

          <button
            class="secondary-button"
            id="cancelCustomerButton"
            type="button"
          >
            Cancel
          </button>
        </div>

        <div
          class="message hidden"
          id="customerFormMessage"
        ></div>
      </form>
    </section>
  </div>

  <div
    class="location-modal-overlay"
    id="locationModalOverlay"
  >
    <section class="customer-modal">
      <div class="customer-modal-heading">
        <div>
          <div class="eyebrow">
            Recurring customer location
          </div>

          <h2>Add Saved Location</h2>
        </div>

        <button
          class="customer-modal-close"
          id="closeLocationModalButton"
          type="button"
        >
          ×
        </button>
      </div>

      <form id="locationForm">
        <input
          id="locationCustomerAccountId"
          type="hidden"
        >

        <div class="customer-form-grid">
          <div class="field">
            <label for="locationName">
              Location Name
            </label>

            <input
              id="locationName"
              placeholder="Main Office, Warehouse, Lab"
              required
            >
          </div>

          <div class="field">
            <label for="locationContactName">
              Contact Name
            </label>

            <input id="locationContactName">
          </div>

          <div class="field full">
            <label for="locationAddress">
              Address
            </label>

            <input
              id="locationAddress"
              required
            >
          </div>

          <div class="field">
            <label for="locationContactPhone">
              Contact Phone
            </label>

            <input
              id="locationContactPhone"
              type="tel"
            >
          </div>

          <div class="field full">
            <label for="locationInstructions">
              Instructions
            </label>

            <textarea
              id="locationInstructions"
              placeholder="Dock hours, gate code or receiving instructions"
            ></textarea>
          </div>

          <div class="customer-checkbox-row">
            <label>
              <input
                id="isPickupLocation"
                type="checkbox"
                checked
              >

              Pickup Location
            </label>

            <label>
              <input
                id="isDeliveryLocation"
                type="checkbox"
                checked
              >

              Delivery Location
            </label>
          </div>
        </div>

        <div class="customer-modal-actions">
          <button
            class="primary-button"
            type="submit"
          >
            Save Location
          </button>

          <button
            class="secondary-button"
            id="cancelLocationButton"
            type="button"
          >
            Cancel
          </button>
        </div>

        <div
          class="message hidden"
          id="locationFormMessage"
        ></div>
      </form>
    </section>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/menu.js"></script>
  <script src="/assets/js/customers.js"></script>
</body>
</html>
