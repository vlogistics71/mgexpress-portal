<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Customers</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --dark-green: #064f3b;
      --green: #087455;
      --light-green: #e7f5ef;
      --coral: #ff665c;
      --background: #f3f8f6;
      --white: #ffffff;
      --ink: #17221e;
      --muted: #68756f;
      --line: #dfe8e4;
      --danger: #9b2929;
      --danger-background: #fff0f0;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 20px;
      background: var(--dark-green);
      color: white;
    }

    .topbar-inner {
      width: min(950px, 100%);
      margin: auto;
    }

    .brand {
      font-size: 23px;
      font-weight: 900;
      line-height: 1.08;
    }

    .brand span {
      color: var(--coral);
    }

    .staff-email {
      margin-top: 7px;
      font-size: 13px;
      opacity: .82;
      overflow-wrap: anywhere;
    }

    .container {
      width: min(950px, 100%);
      margin: auto;
      padding: 28px 18px 75px;
    }

    .heading-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 17px;
    }

    h1 {
      margin: 0;
      font-size: clamp(39px, 8vw, 55px);
      line-height: 1.03;
    }

    .dashboard-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      color: var(--dark-green);
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 21px;
    }

    .stat-card {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: white;
      box-shadow: 0 7px 22px rgba(0, 0, 0, .04);
    }

    .stat-number {
      color: var(--green);
      font-size: 31px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .stat-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .filters {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 21px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
    }

    .search-input {
      width: 100%;
      min-height: 51px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--ink);
    }

    .refresh-button {
      min-height: 51px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: white;
      color: var(--dark-green);
      font-weight: 900;
      cursor: pointer;
    }

    .list-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 27px 2px 13px;
    }

    .list-heading h2 {
      margin: 0;
      font-size: 28px;
    }

    .visible-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .customer-list {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      box-shadow: 0 8px 25px rgba(0, 0, 0, .04);
    }

    .customer-row {
      display: grid;
      grid-template-columns:
        minmax(0, 1.4fr)
        minmax(90px, .5fr)
        minmax(120px, .65fr)
        minmax(145px, .75fr)
        auto;
      gap: 15px;
      align-items: center;
      min-height: 88px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: white;
      color: inherit;
      text-decoration: none;
    }

    .customer-row:last-child {
      border-bottom: 0;
    }

    .customer-row:active {
      background: #f7faf9;
    }

    .customer-name {
      color: var(--dark-green);
      font-size: 18px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .customer-email {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .meta-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 8px 11px;
      border-radius: 999px;
      background: var(--light-green);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .arrow {
      color: var(--green);
      font-size: 27px;
      font-weight: 900;
    }

    .empty,
    .error {
      padding: 31px 22px;
      border-radius: 19px;
      text-align: center;
      line-height: 1.55;
    }

    .empty {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
    }

    .error {
      background: var(--danger-background);
      color: var(--danger);
    }

    @media (max-width: 760px) {
      .heading-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .dashboard-button {
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .refresh-button {
        width: 100%;
      }

      .customer-row {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 12px;
        min-height: 125px;
      }

      .customer-main {
        grid-column: 1 / 2;
      }

      .jobs-block {
        grid-column: 1 / 2;
      }

      .active-block {
        grid-column: 1 / 2;
      }

      .last-job-block {
        grid-column: 1 / 2;
      }

      .status-pill {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
      }

      .arrow {
        grid-column: 2 / 3;
        grid-row: 2 / 5;
        align-self: center;
      }
    }

    @media (max-width: 430px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        MG <span>EXPRESS</span> DISPATCH
      </div>

      <div
        class="staff-email"
        id="staffEmail"
      ></div>
    </div>
  </header>

  <main class="container">
    <div class="heading-row">
      <div>
        <div class="eyebrow">
          Customer accounts and delivery records
        </div>

        <h1>Customers</h1>
      </div>

      <a
        class="dashboard-button"
        href="/dashboard.html"
      >
        ← Dashboard
      </a>
    </div>

    <section class="stats">
      <div class="stat-card">
        <div
          class="stat-number"
          id="totalCustomers"
        >
          0
        </div>

        <div class="stat-label">
          Total Customers
        </div>
      </div>

      <div class="stat-card">
        <div
          class="stat-number"
          id="totalJobs"
        >
          0
        </div>

        <div class="stat-label">
          Total Customer Jobs
        </div>
      </div>

      <div class="stat-card">
        <div
          class="stat-number"
          id="customersWithActiveJobs"
        >
          0
        </div>

        <div class="stat-label">
          Customers With Active Jobs
        </div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-grid">
        <input
          class="search-input"
          id="searchInput"
          type="search"
          placeholder="Search customer name, email or address"
        >

        <button
          class="refresh-button"
          id="refreshButton"
          type="button"
        >
          Refresh
        </button>
      </div>
    </section>

    <div class="list-heading">
      <h2>Customer List</h2>

      <div
        class="visible-count"
        id="visibleCount"
      >
        0 customers
      </div>
    </div>

    <section id="customersBox">
      <div class="empty">
        Loading customers...
      </div>
    </section>
  </main>

  <script>
    const client = supabase.createClient(
      "https://dczlucwfjayymlwbzzdi.supabase.co",
      "sb_publishable_kcv_a78ZyUxMo2neKUANdw_XN7eAMpI"
    );

    window.mgDispatchClient = client;

    const customersBox =
      document.getElementById("customersBox");

    const searchInput =
      document.getElementById("searchInput");

    let allJobs = [];
    let customers = [];

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function normalizeEmail(value) {
      return String(value || "")
        .trim()
        .toLowerCase();
    }

    function normalizeName(value) {
      return String(value || "Customer")
        .trim()
        .toLowerCase();
    }

    function cleanStatus(value) {
      return String(value || "")
        .trim()
        .toLowerCase();
    }

    function isClosedJob(job) {
      return [
        "delivered",
        "cancelled",
        "canceled"
      ].includes(cleanStatus(job.status));
    }

    function formatDate(value) {
      if (!value) {
        return "No jobs";
      }

      const date =
        value instanceof Date
          ? value
          : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return "Not recorded";
      }

      return new Intl.DateTimeFormat(
        "en-US",
        {
          month: "short",
          day: "numeric",
          year: "numeric"
        }
      ).format(date);
    }

    function getCustomerKey(job) {
      const email =
        normalizeEmail(job.customer_email);

      if (email) {
        return "email:" + email;
      }

      return (
        "name:" +
        normalizeName(job.customer_name)
      );
    }

    function buildCustomerList() {
      const groupedCustomers = new Map();

      allJobs.forEach(job => {
        const key = getCustomerKey(job);

        if (!groupedCustomers.has(key)) {
          groupedCustomers.set(key, {
            key: key,
            name:
              String(
                job.customer_name ||
                "Customer"
              ).trim(),

            email:
              normalizeEmail(
                job.customer_email
              ),

            jobs: [],
            activeJobs: 0,
            lastJobAt: null,
            addresses: new Set()
          });
        }

        const customer =
          groupedCustomers.get(key);

        customer.jobs.push(job);

        if (!isClosedJob(job)) {
          customer.activeJobs += 1;
        }

        [
          job.pickup_address,
          job.delivery_address
        ].forEach(address => {
          const cleanAddress =
            String(address || "").trim();

          if (cleanAddress) {
            customer.addresses.add(
              cleanAddress
            );
          }
        });

        if (job.created_at) {
          const jobDate =
            new Date(job.created_at);

          if (
            !Number.isNaN(
              jobDate.getTime()
            ) &&
            (
              !customer.lastJobAt ||
              jobDate >
                customer.lastJobAt
            )
          ) {
            customer.lastJobAt =
              jobDate;
          }
        }
      });

      customers =
        Array.from(
          groupedCustomers.values()
        ).sort((first, second) => {
          const firstTime =
            first.lastJobAt?.getTime() || 0;

          const secondTime =
            second.lastJobAt?.getTime() || 0;

          return secondTime - firstTime;
        });
    }

    async function verifyDispatchUser() {
      const sessionResult =
        await client.auth.getSession();

      const session =
        sessionResult.data.session;

      if (!session) {
        location.replace(
          "/index.html"
        );

        return null;
      }

      document
        .getElementById("staffEmail")
        .textContent =
          session.user.email || "";

      const profileResult =
        await client
          .from("profiles")
          .select("role")
          .eq(
            "id",
            session.user.id
          )
          .maybeSingle();

      if (
        profileResult.error ||
        !profileResult.data
      ) {
        throw new Error(
          profileResult.error?.message ||
          "No MG Express profile was found."
        );
      }

      const role =
        String(
          profileResult.data.role || ""
        ).toLowerCase();

      if (
        ![
          "admin",
          "staff",
          "dispatcher"
        ].includes(role)
      ) {
        if (role === "driver") {
          location.replace(
            "/driver.html"
          );

          return null;
        }

        if (role === "customer") {
          location.replace(
            "/customer.html"
          );

          return null;
        }

        throw new Error(
          "This account does not have dispatch access."
        );
      }

      window.dispatchEvent(
        new CustomEvent(
          "mg-dispatch-ready",
          {
            detail: {
              email:
                session.user.email
            }
          }
        )
      );

      return session;
    }

    async function loadCustomers() {
      customersBox.className = "";

      customersBox.innerHTML = `
        <div class="empty">
          Loading customers...
        </div>
      `;

      const result =
        await client
          .from("quotes")
          .select(`
            id,
            job_number,
            customer_name,
            customer_email,
            pickup_address,
            delivery_address,
            status,
            created_at
          `)
          .order(
            "created_at",
            {
              ascending: false
            }
          );

      if (result.error) {
        throw result.error;
      }

      allJobs =
        result.data || [];

      buildCustomerList();
      updateStatistics();
      renderCustomers();
    }

    function filteredCustomers() {
      const search =
        searchInput.value
          .trim()
          .toLowerCase();

      if (!search) {
        return customers;
      }

      return customers.filter(
        customer => {
          const searchableText = [
            customer.name,
            customer.email,
            ...Array.from(
              customer.addresses
            )
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();

          return searchableText.includes(
            search
          );
        }
      );
    }

    function updateStatistics() {
      document
        .getElementById(
          "totalCustomers"
        )
        .textContent =
          customers.length;

      document
        .getElementById(
          "totalJobs"
        )
        .textContent =
          allJobs.length;

      document
        .getElementById(
          "customersWithActiveJobs"
        )
        .textContent =
          customers.filter(
            customer =>
              customer.activeJobs > 0
          ).length;
    }

    function createCustomerUrl(customer) {
  const portalBase =
    "https://portal.migenteexpress.com";

  if (customer.email) {
    return (
      portalBase +
      "/customer-details.html?email=" +
      encodeURIComponent(customer.email)
    );
  }

  return (
    portalBase +
    "/customer-details.html?name=" +
    encodeURIComponent(customer.name)
  );
}

    function renderCustomers() {
      const shownCustomers =
        filteredCustomers();

      document
        .getElementById(
          "visibleCount"
        )
        .textContent =
          shownCustomers.length +
          (
            shownCustomers.length === 1
              ? " customer"
              : " customers"
          );

      if (!shownCustomers.length) {
        customersBox.className = "";

        customersBox.innerHTML = `
          <div class="empty">
            No customers match your search.
          </div>
        `;

        return;
      }

      customersBox.className =
        "customer-list";

      customersBox.innerHTML =
        shownCustomers
          .map(customer => {
            const customerUrl =
              createCustomerUrl(
                customer
              );

            return `
              <a
                class="customer-row"
                href="${escapeHtml(
                  customerUrl
                )}"
              >
                <div class="customer-main">
                  <div class="customer-name">
                    ${escapeHtml(
                      customer.name
                    )}
                  </div>

                  <div class="customer-email">
                    ${escapeHtml(
                      customer.email ||
                      "No email recorded"
                    )}
                  </div>
                </div>

                <div class="jobs-block">
                  <span class="meta-label">
                    Jobs
                  </span>

                  <div class="meta-value">
                    ${customer.jobs.length}
                  </div>
                </div>

                <div class="active-block">
                  <span class="meta-label">
                    Active
                  </span>

                  <div class="meta-value">
                    ${customer.activeJobs}
                  </div>
                </div>

                <div class="last-job-block">
                  <span class="meta-label">
                    Last Job
                  </span>

                  <div class="meta-value">
                    ${escapeHtml(
                      formatDate(
                        customer.lastJobAt
                      )
                    )}
                  </div>
                </div>

                <div class="status-pill">
                  Customer
                </div>

                <div class="arrow">
                  ›
                </div>
              </a>
            `;
          })
          .join("");
    }

    searchInput.addEventListener(
      "input",
      renderCustomers
    );

    document
      .getElementById(
        "refreshButton"
      )
      .addEventListener(
        "click",
        async function () {
          this.disabled = true;
          this.textContent =
            "Refreshing...";

          try {
            await loadCustomers();
          } catch (error) {
            customersBox.className = "";

            customersBox.innerHTML = `
              <div class="error">
                ${escapeHtml(
                  error.message ||
                  "Unable to refresh customers."
                )}
              </div>
            `;
          } finally {
            this.disabled = false;
            this.textContent =
              "Refresh";
          }
        }
      );

    (async function startPage() {
      try {
        const session =
          await verifyDispatchUser();

        if (!session) {
          return;
        }

        await loadCustomers();
      } catch (error) {
        customersBox.className = "";

        customersBox.innerHTML = `
          <div class="error">
            ${escapeHtml(
              error.message ||
              "Unable to load customers."
            )}
          </div>
        `;
      }
    })();
  </script>

  <script src="/dispatch-menu.js"></script>
</body>
</html>
