<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Portal | Mi Gente Express</title><link rel="stylesheet" href="/assets/styles.css"></head>
<body><header class="topbar"><div class="container topbar-inner"><div class="brand">MI GENTE <span>EXPRESS</span> CUSTOMER</div><div class="nav"><a class="btn secondary" href="/request.html">New Request</a><button id="signout" class="secondary">Sign Out</button></div></div></header><main><div class="container"><h1>Your deliveries</h1><section class="panel"><div id="cards" class="cards"></div></section></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script type="module">
import {db,sessionAndProfile,logout,escapeHtml,money,statusLabel} from "/assets/js/core.js";const u=await sessionAndProfile(["customer"]);signout.onclick=logout;
const {data,error}=await db.from("quotes").select("*").eq("customer_email",u.session.user.email).order("created_at",{ascending:false});cards.innerHTML=error?`<div class="notice error">${escapeHtml(error.message)}</div>`:(data||[]).map(q=>`<article class="card"><h3>${escapeHtml(q.job_number)}</h3><p><span class="status ${q.status}">${statusLabel(q.status)}</span></p><p><b>Pickup:</b> ${escapeHtml(q.pickup_address)}</p><p><b>Delivery:</b> ${escapeHtml(q.delivery_address)}</p><p class="money">${money(q.approved_price)}</p><div class="actions"><a class="btn secondary" href="/job.html?id=${q.id}">View BOL</a>${q.approved_price&&q.payment_status!=="paid"?`<button onclick="pay('${q.id}')">Pay Now</button>`:""}</div></article>`).join("")||"<p>No deliveries yet.</p>";
window.pay=async id=>{const r=await fetch("/api/create-checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({quote_id:id})});const d=await r.json();if(r.ok)location.href=d.url;else alert(d.error)};
</script></body></html>
