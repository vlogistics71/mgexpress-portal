<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Driver Portal | Mi Gente Express</title><link rel="stylesheet" href="/assets/styles.css"></head>
<body><header class="topbar"><div class="container topbar-inner"><div class="brand">MI GENTE <span>EXPRESS</span> DRIVER</div><button id="signout" class="secondary">Sign Out</button></div></header><main><div class="container"><h1>Assigned jobs</h1><section class="panel"><div id="cards" class="cards"></div></section></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script type="module">
import {db,sessionAndProfile,logout,escapeHtml,statusLabel} from "/assets/js/core.js";const u=await sessionAndProfile(["driver"]);signout.onclick=logout;
const {data:driver}=await db.from("drivers").select("id").eq("auth_user_id",u.session.user.id).single();if(!driver){cards.innerHTML='<div class="notice info">Your driver account has not been linked by dispatch.</div>'}else{const {data,error}=await db.from("quotes").select("*").eq("assigned_driver_id",driver.id).order("created_at",{ascending:false});cards.innerHTML=error?`<div class="notice error">${escapeHtml(error.message)}</div>`:(data||[]).map(q=>`<article class="card"><h3>${escapeHtml(q.job_number)}</h3><p><span class="status ${q.status}">${statusLabel(q.status)}</span></p><p><b>Pickup:</b> ${escapeHtml(q.pickup_address)}</p><p><b>Delivery:</b> ${escapeHtml(q.delivery_address)}</p><div class="actions"><a class="btn" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(q.pickup_address)}">Navigate</a><a class="btn secondary" href="/job.html?id=${q.id}">Open Job</a></div></article>`).join("")||"<p>No assigned jobs.</p>"}
</script></body></html>
