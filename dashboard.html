<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dispatcher Dashboard</title><link rel="stylesheet" href="styles.css"></head>
<body><header class="top"><div class="container topin"><div class="brand">MG <span>EXPRESS</span> DISPATCH</div><div><span id="who" class="small"></span> <button id="out" class="secondary">Sign Out</button></div></div></header>
<main><div class="container">
<div class="toolbar"><div><p class="muted">Dispatch control center</p><h1>Dashboard</h1></div><button id="show">+ New Quote</button></div>
<section class="stats"><div class="stat"><strong id="n1">0</strong><span>New</span></div><div class="stat"><strong id="n2">0</strong><span>Waiting Payment</span></div><div class="stat"><strong id="n3">0</strong><span>Paid / Ready</span></div><div class="stat"><strong id="n4">0</strong><span>In Transit</span></div><div class="stat"><strong id="n5">0</strong><span>Delivered</span></div></section>
<section id="formbox" class="panel hidden"><h2>Create Quote</h2><form id="qf" class="grid">
<label>Job Number<input name="job_number" placeholder="MGE-000001" required></label><label>Customer Name<input name="customer_name" required></label>
<label>Customer Email<input name="customer_email" type="email" required></label><label>Customer Phone<input name="customer_phone"></label>
<label>Pickup Address<textarea name="pickup_address" required></textarea></label><label>Delivery Address<textarea name="delivery_address" required></textarea></label>
<label>Vehicle<select name="vehicle_type"><option>Sedan / Small Car</option><option>Small Cargo Van</option><option>Sprinter Van</option><option>Not Sure</option></select></label>
<label>Delivery Speed<select name="delivery_speed"><option>2-Hour Delivery</option><option>3-Hour Delivery</option><option>4-Hour Delivery</option><option>5-Hour Delivery</option><option>6-Hour Delivery</option><option>Next-Day Delivery</option></select></label>
<label>Package Type<input name="package_type"></label><label>Weight<input name="weight"></label><label>Approved Price<input name="approved_price" type="number" step="0.01"></label>
<label>Status<select name="status"><option>new</option><option>waiting_payment</option><option>paid</option><option>dispatched</option><option>in_transit</option><option>delivered</option><option>cancelled</option></select></label>
<label class="full">Instructions<textarea name="special_instructions"></textarea></label><div class="full"><button>Save Quote</button></div></form><div id="fm"></div></section>
<section class="panel"><div class="toolbar"><h2>Quotes & Jobs</h2><button id="reload" class="secondary">Refresh</button></div><div class="tablewrap"><table><thead><tr><th>Job</th><th>Customer</th><th>Route</th><th>Vehicle</th><th>Speed</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></section>
</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script>
const db=supabase.createClient(MG_CONFIG.SUPABASE_URL,MG_CONFIG.SUPABASE_ANON_KEY);let data=[];
async function auth(){const {data:{session}}=await db.auth.getSession();if(!session){location.href='index.html';return false}who.textContent=session.user.email;const {data:p}=await db.from('profiles').select('role').eq('id',session.user.id).single();if(!p||!['admin','dispatcher'].includes(p.role)){alert('Not authorized');await db.auth.signOut();location.href='index.html';return false}return true}
out.onclick = async () => {
  const { error } = await db.auth.signOut();

  if (error) {
    alert(error.message);
    return;
  }

  window.location.replace("/index.html");
};
qf.onsubmit=async e=>{e.preventDefault();const b=Object.fromEntries(new FormData(qf).entries());b.approved_price=b.approved_price?Number(b.approved_price):null;const {error}=await db.from('quotes').insert(b);if(error){fm.className='notice error';fm.textContent=error.message}else{fm.className='notice success';fm.textContent='Saved';qf.reset();formbox.classList.add('hidden');load()}};
async function load(){const {data:d,error}=await db.from('quotes').select('*').order('created_at',{ascending:false});if(error){rows.innerHTML='<tr><td colspan=8>'+esc(error.message)+'</td></tr>';return}data=d||[];render()}
function render(){rows.innerHTML=data.map(q=>`<tr><td><b>${esc(q.job_number||'')}</b></td><td>${esc(q.customer_name||'')}<br><span class=small>${esc(q.customer_email||'')}</span></td><td>${esc(q.pickup_address||'')}<br>→<br>${esc(q.delivery_address||'')}</td><td>${esc(q.vehicle_type||'')}</td><td>${esc(q.delivery_speed||'')}</td><td>${q.approved_price?'$'+Number(q.approved_price).toFixed(2):'—'}</td><td><span class="status ${q.status}">${q.status}</span></td><td><div class=actions><button onclick="next('${q.id}','${q.status}')">Advance</button><button onclick="cancelQ('${q.id}')">Cancel</button></div></td></tr>`).join('');const c=s=>data.filter(x=>x.status===s).length;n1.textContent=c('new');n2.textContent=c('waiting_payment');n3.textContent=c('paid');n4.textContent=c('in_transit');n5.textContent=c('delivered')}
const order=['new','waiting_payment','paid','dispatched','in_transit','delivered'];async function next(id,s){const i=order.indexOf(s);if(i<0||i===order.length-1)return;await db.from('quotes').update({status:order[i+1]}).eq('id',id);load()}async function cancelQ(id){await db.from('quotes').update({status:'cancelled'}).eq('id',id);load()}
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
auth().then(ok=>{if(ok)load()});
</script></body></html>
