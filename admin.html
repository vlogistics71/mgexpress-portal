<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard | Mi Gente Express</title><link rel="stylesheet" href="/assets/styles.css"></head>
<body><header class="topbar"><div class="container topbar-inner"><div class="brand">MI GENTE <span>EXPRESS</span> ADMIN</div><nav class="nav"><span id="who" class="small"></span><a class="btn secondary" href="/request.html">Public Request Form</a><button id="signout" class="secondary">Sign Out</button></nav></div></header>
<main><div class="container"><div class="toolbar"><div><p class="muted">Dispatch control center</p><h1>Dashboard</h1></div><button id="toggle">+ Create Quote</button></div>
<section class="stats"><div class="stat"><strong id="sNew">0</strong><span>New</span></div><div class="stat"><strong id="sWait">0</strong><span>Waiting Payment</span></div><div class="stat"><strong id="sPaid">0</strong><span>Paid</span></div><div class="stat"><strong id="sDisp">0</strong><span>Dispatched</span></div><div class="stat"><strong id="sTransit">0</strong><span>In Transit</span></div><div class="stat"><strong id="sDone">0</strong><span>Delivered</span></div></section>
<section id="creator" class="panel hidden"><h2>Create Quote / Job</h2><form id="quoteForm" class="grid">
<label>Customer Name<input name="customer_name" required></label><label>Customer Email<input name="customer_email" type="email" required></label>
<label>Customer Phone<input name="customer_phone"></label><label>Company<input name="company"></label>
<label>Pickup Address<textarea name="pickup_address" rows="3" required></textarea></label><label>Delivery Address<textarea name="delivery_address" rows="3" required></textarea></label>
<label>Vehicle<select name="vehicle_type"><option>Sedan / Small Car</option><option>Small Cargo Van</option><option>Sprinter Van</option><option>Not Sure</option></select></label>
<label>Delivery Speed<select name="delivery_speed"><option>2-Hour Delivery</option><option>3-Hour Delivery</option><option>4-Hour Delivery</option><option>5-Hour Delivery</option><option>6-Hour Delivery</option><option>Next-Day Delivery</option></select></label>
<label>Package Type<input name="package_type"></label><label>Approximate Weight<input name="weight"></label>
<label>Approved Price ($)<input name="approved_price" type="number" min="0" step="0.01"></label><label>Status<select name="status"><option value="new">New</option><option value="waiting_payment">Waiting Payment</option><option value="paid">Paid / Ready</option></select></label>
<label class="full">Special Instructions<textarea name="special_instructions" rows="3"></textarea></label><div class="full"><button>Save Quote</button></div></form><div id="formMsg"></div></section>
<section class="panel"><div class="toolbar"><h2>Quotes & Jobs</h2><button id="refresh" class="secondary">Refresh</button></div><div class="table-wrap"><table><thead><tr><th>Job</th><th>Customer</th><th>Route</th><th>Vehicle</th><th>Price</th><th>Status</th><th>Payment</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></section>
</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script type="module">
import {db,sessionAndProfile,logout,escapeHtml,money,statusLabel} from "/assets/js/core.js";
let records=[]; const user=await sessionAndProfile(["admin","dispatcher"]); if(user)who.textContent=user.session.user.email;
signout.onclick=logout; toggle.onclick=()=>creator.classList.toggle("hidden"); refresh.onclick=load;
quoteForm.onsubmit=async e=>{e.preventDefault();const body=Object.fromEntries(new FormData(quoteForm).entries());body.approved_price=body.approved_price?Number(body.approved_price):null;body.created_by=user.session.user.id;
const {error}=await db.from("quotes").insert(body);formMsg.className="notice "+(error?"error":"success");formMsg.textContent=error?error.message:"Quote saved.";if(!error){quoteForm.reset();creator.classList.add("hidden");load()}};
async function load(){const {data,error}=await db.from("quotes").select("*").order("created_at",{ascending:false});if(error){rows.innerHTML=`<tr><td colspan="8">${escapeHtml(error.message)}</td></tr>`;return}records=data||[];render()}
function render(){rows.innerHTML=records.map(q=>`<tr><td><b>${escapeHtml(q.job_number)}</b><br><span class="small">${new Date(q.created_at).toLocaleDateString()}</span></td><td>${escapeHtml(q.customer_name)}<br><span class="small">${escapeHtml(q.customer_email)}</span></td><td>${escapeHtml(q.pickup_address)}<br>→<br>${escapeHtml(q.delivery_address)}</td><td>${escapeHtml(q.vehicle_type||"")}</td><td>${money(q.approved_price)}</td><td><span class="status ${q.status}">${statusLabel(q.status)}</span></td><td>${escapeHtml(q.payment_status||"unpaid")}</td><td><div class="actions"><a class="btn secondary" href="/job.html?id=${q.id}">Open</a>${q.approved_price&&q.payment_status!=="paid"?`<button onclick="pay('${q.id}')">Payment Link</button>`:""}</div></td></tr>`).join("");
const count=s=>records.filter(x=>x.status===s).length;sNew.textContent=count("new");sWait.textContent=count("waiting_payment");sPaid.textContent=count("paid");sDisp.textContent=count("dispatched");sTransit.textContent=count("in_transit");sDone.textContent=count("delivered")}
window.pay=async id=>{const r=await fetch("/api/create-checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({quote_id:id})});const d=await r.json();if(!r.ok)return alert(d.error||"Unable to create payment link");await navigator.clipboard.writeText(d.url);alert("Payment link copied. Send it to the customer.");};
load();
</script></body></html>
